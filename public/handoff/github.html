<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>WOWEN handoff</title>
    <meta http-equiv="refresh" content="4.9;url=https://github.com/uchusei" />
    <link rel="stylesheet" href="/handoff.css" />
  </head>
  <body>
    <main class="handoff">
      <section class="handoff__trace" aria-label="Handoff trace">
        <p class="output-line output-line--dim" style="--delay: 0s">
          <span class="output-line__prefix">&gt;</span>
          <span>
            handoff pending
            <span class="output-line__dots" aria-hidden="true"><span>.</span><span>.</span><span>.</span><span>.</span></span>
          </span>
        </p>

        <p class="output-line output-line--dim" style="--delay: 1s">
          <span class="output-line__prefix">&gt;</span>
          <span>opening external route...</span>
        </p>

        <p class="output-line output-line--strong" style="--delay: 2.15s">
          <span class="output-line__prefix">&gt;</span>
          <span>destination: github.com/uchusei</span>
        </p>

        <p class="output-line output-line--dim" style="--delay: 3.35s">
          <span class="output-line__prefix">&gt;</span>
          <span>handoff <span class="output-line__accent">confirmed</span></span>
        </p>
      </section>
    </main>
  </body>
</html>
